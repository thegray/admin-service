name: Lint

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  golangci-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go 1.25.0
        uses: actions/setup-go@v5
        with:
          go-version: 1.25.0

      - name: Run golangci-lint v2.11.2
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.2
